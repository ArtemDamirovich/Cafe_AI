version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cafe_ai_db
    environment:
      POSTGRES_DB: cafesvoidb
      POSTGRES_USER: cafe_admin
      POSTGRES_PASSWORD: cafe_secret_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: